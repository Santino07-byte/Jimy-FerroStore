services:
  mongo:
    image: mongo:7
    container_name: ferreteria-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: ferreteria-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/ferreteria_virtual
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-ferrostock_clave_secreta_dev}
      NOMBRE_NEGOCIO: ${NOMBRE_NEGOCIO:-FerroStock}
      CUIT_NEGOCIO: ${CUIT_NEGOCIO:-}
      DIRECCION_NEGOCIO: ${DIRECCION_NEGOCIO:-}
    depends_on:
      - mongo

volumes:
  mongo_data:
